<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Manager</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        input[type="file"] {
            display: block;
            margin-top: 0.5rem;
        }
        button {
            background: #0076ff;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        button:hover {
            background: #0056cc;
        }
        .parties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .party-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1rem;
            background: white;
        }
        .party-logo {
            width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 1rem;
            background: #f8f9fa;
            border-radius: 4px;
        }
        .party-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .delete-btn {
            background: #ff4d4f;
            margin-top: 0.5rem;
        }
        .delete-btn:hover {
            background: #d9363e;
        }
    </style>
</head>
<body>
    <h1>Party Manager</h1>

    <div class="form-group">
        <label for="partyName">Party Name</label>
        <input type="text" id="partyName" placeholder="Enter party name" required>
    </div>

    <div class="form-group">
        <label for="partyLogo">Party Logo</label>
        <input type="file" id="partyLogo" accept="image/*" required>
    </div>

    <button onclick="addParty()">Add Party</button>

    <div class="parties-grid" id="partiesContainer"></div>

    <script>
        let parties = JSON.parse(localStorage.getItem('parties')) || [];

        function saveParties() {
            localStorage.setItem('parties', JSON.stringify(parties));
            renderParties();
        }

        function renderParties() {
            const container = document.getElementById('partiesContainer');
            container.innerHTML = '';

            parties.forEach((party, index) => {
                const card = document.createElement('div');
                card.className = 'party-card';

                const logo = document.createElement('img');
                logo.className = 'party-logo';
                logo.src = party.logo;
                logo.alt = `${party.name} logo`;

                const name = document.createElement('div');
                name.className = 'party-name';
                name.textContent = party.name;

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = 'Delete';
                deleteBtn.onclick = () => {
                    parties.splice(index, 1);
                    saveParties();
                };

                card.append(logo, name, deleteBtn);
                container.appendChild(card);
            });
        }

        function addParty() {
            const nameInput = document.getElementById('partyName');
            const logoInput = document.getElementById('partyLogo');

            if (!nameInput.value.trim() || logoInput.files.length === 0) {
                alert('Please enter a name and select a logo');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                parties.push({
                    name: nameInput.value.trim(),
                    logo: e.target.result
                });
                saveParties();
                nameInput.value = '';
                logoInput.value = '';
            };
            reader.readAsDataURL(logoInput.files[0]);
        }

        renderParties();
    </script>
</body>
</html>
