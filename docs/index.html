<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .party-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .party-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border: 1px solid #eee;
        }
        input, button {
            padding: 8px;
            margin: 5px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>Party Manager</h1>
    <div>
        <input type="text" id="partyName" placeholder="Party Name">
        <input type="file" id="partyLogo" accept="image/*">
        <button onclick="addParty()">Add Party</button>
    </div>
    <div id="partiesContainer"></div>

    <script>
        let parties = [];

        function addParty() {
            const name = document.getElementById('partyName').value.trim();
            const logoInput = document.getElementById('partyLogo');

            if (!name || !logoInput.files.length) {
                alert('Please provide both name and logo');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const party = {
                    id: Date.now(),
                    name: name,
                    logo: e.target.result
                };
                parties.push(party);
                renderParties();
                document.getElementById('partyName').value = '';
                logoInput.value = '';
            };
            reader.readAsDataURL(logoInput.files[0]);
        }

        function renderParties() {
            const container = document.getElementById('partiesContainer');
            container.innerHTML = '';

            parties.forEach(party => {
                const card = document.createElement('div');
                card.className = 'party-card';
                card.innerHTML = `
                    <img src="${party.logo}" class="party-logo" alt="${party.name} logo">
                    <div>${party.name}</div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
