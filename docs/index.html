<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Logo Uploader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .logo-upload {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logo-upload:hover {
            border-color: #888;
            background-color: #f9f9f9;
        }
        .logo-preview {
            max-width: 100px;
            max-height: 100px;
            margin-top: 10px;
            display: none;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .party-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .party-logo {
            width: 50px;
            height: 50px;
            margin-right: 15px;
            object-fit: contain;
        }
        .party-name {
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <h1>Party Logo Uploader</h1>

    <div class="form-group">
        <label for="partyName">Party Name:</label>
        <input type="text" id="partyName" placeholder="Enter party name">
    </div>

    <div class="form-group">
        <label>Party Logo:</label>
        <div class="logo-upload" id="logoUpload">
            Click to upload or drag and drop
            <input type="file" id="logoFile" accept="image/*" style="display: none;">
        </div>
        <img id="logoPreview" class="logo-preview" alt="Logo preview">
    </div>

    <button id="addParty">Add Party</button>

    <h2>Added Parties</h2>
    <div id="partiesList"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const partyNameInput = document.getElementById('partyName');
            const logoFileInput = document.getElementById('logoFile');
            const logoUpload = document.getElementById('logoUpload');
            const logoPreview = document.getElementById('logoPreview');
            const addPartyBtn = document.getElementById('addParty');
            const partiesList = document.getElementById('partiesList');

            let currentLogoFile = null;

            // Handle logo upload click
            logoUpload.addEventListener('click', function() {
                logoFileInput.click();
            });

            // Handle file selection
            logoFileInput.addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    currentLogoFile = e.target.files[0];
                    const reader = new FileReader();

                    reader.onload = function(event) {
                        logoPreview.src = event.target.result;
                        logoPreview.style.display = 'block';
                    }

                    reader.readAsDataURL(currentLogoFile);
                }
            });

            // Handle drag and drop
            logoUpload.addEventListener('dragover', function(e) {
                e.preventDefault();
                logoUpload.style.borderColor = '#666';
            });

            logoUpload.addEventListener('dragleave', function() {
                logoUpload.style.borderColor = '#ccc';
            });

            logoUpload.addEventListener('drop', function(e) {
                e.preventDefault();
                logoUpload.style.borderColor = '#ccc';

                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    currentLogoFile = e.dataTransfer.files[0];
                    const reader = new FileReader();

                    reader.onload = function(event) {
                        logoPreview.src = event.target.result;
                        logoPreview.style.display = 'block';
                    }

                    reader.readAsDataURL(currentLogoFile);
                }
            });

            // Add party to the list
            addPartyBtn.addEventListener('click', function() {
                const partyName = partyNameInput.value.trim();
                if (!partyName) {
                    alert('Please enter a party name');
                    return;
                }

                if (!currentLogoFile) {
                    alert('Please upload a logo');
                    return;
                }

                const partyItem = document.createElement('div');
                partyItem.className = 'party-item';

                const logoImg = document.createElement('img');
                logoImg.className = 'party-logo';
                logoImg.src = logoPreview.src;
                logoImg.alt = `${partyName} logo`;

                const nameSpan = document.createElement('span');
                nameSpan.className = 'party-name';
                nameSpan.textContent = partyName;

                partyItem.appendChild(logoImg);
                partyItem.appendChild(nameSpan);
                partiesList.appendChild(partyItem);

                // Reset form
                partyNameInput.value = '';
                logoPreview.style.display = 'none';
                currentLogoFile = null;
            });
        });
    </script>
</body>
</html>
